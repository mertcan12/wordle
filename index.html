<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Wordle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <h1 id="baslik">WORDLE</h1>

  <div id="board">
    <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
    <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
    <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
    <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
    <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
    <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
  </div>

  <div id="klavye">
    <div class="klavye-satir">
      <button class="tus">Q</button><button class="tus">W</button><button class="tus">E</button><button class="tus">R</button><button class="tus">T</button><button class="tus">Y</button><button class="tus">U</button><button class="tus">I</button><button class="tus">O</button><button class="tus">P</button>
    </div>
    <div class="klavye-satir">
      <button class="tus">A</button><button class="tus">S</button><button class="tus">D</button><button class="tus">F</button><button class="tus">G</button><button class="tus">H</button><button class="tus">J</button><button class="tus">K</button><button class="tus">L</button>
    </div>
    <div class="klavye-satir">
      <button class="tus" id="enter-tus">ENTER</button><button class="tus">Z</button><button class="tus">X</button><button class="tus">C</button><button class="tus">V</button><button class="tus">B</button><button class="tus">N</button><button class="tus">M</button><button class="tus" id="sil-tus">⌫</button>
    </div>
  </div>

  <button id="yeniOyun">Yeni Oyun</button>

  <script src="script.js"></script>
</body>
</html>
